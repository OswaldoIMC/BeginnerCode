name: CD - Build APK & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub Release with the APK"
        required: false
        default: "true"
        type: boolean

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project (expo prebuild)
        run: npx expo prebuild -p android --clean --no-install

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Configure signing in build.gradle
        run: |
          cd android/app
          # Insert signing config into build.gradle
          sed -i '/android {/a \
              signingConfigs {\
                  release {\
                      storeFile file("release.keystore")\
                      storePassword System.getenv("KEYSTORE_PASSWORD")\
                      keyAlias System.getenv("KEY_ALIAS")\
                      keyPassword System.getenv("KEY_PASSWORD")\
                  }\
              }' build.gradle

          # Replace signingConfig for release buildType
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' build.gradle
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build APK (Release)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK_PATH" BeginnerCode.apk

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeginnerCode-APK
          path: BeginnerCode.apk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('manual-{0}', github.run_number) }}
          name: "BeginnerCode ${{ github.ref_name || format('Build #{0}', github.run_number) }}"
          body: |
            ## BeginnerCode - Nueva versión

            ### Instalación
            1. Descarga el archivo `BeginnerCode.apk` de abajo
            2. Ábrelo en tu dispositivo Android
            3. Si te pide permisos para instalar desde fuentes desconocidas, acéptalos
            4. ¡Listo!

            ---
            *Build generado automáticamente por GitHub Actions*
          files: BeginnerCode.apk
          draft: false
          prerelease: false
